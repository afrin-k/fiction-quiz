<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Universe Quiz{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --gold:        #c9a84c;
            --gold-light:  #e8c97a;
            --gold-dim:    #7a5f28;
            --ink:         #0b0c10;
            --ink-mid:     #12141a;
            --ink-surface: #1a1d26;
            --ink-raised:  #212532;
            --parchment:   #f2e8d5;
            --mist:        rgba(201,168,76,0.08);
            --text-main:   #e8e0d0;
            --text-muted:  #8a8070;
            --radius:      12px;
            --transition:  0.35s cubic-bezier(0.4,0,0.2,1);
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Crimson Pro', Georgia, serif;
            background-color: var(--ink);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.5) 0%, transparent 100%),
                radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 50% 10%, rgba(255,255,255,0.4) 0%, transparent 100%),
                radial-gradient(1px 1px at 70% 80%, rgba(255,255,255,0.35) 0%, transparent 100%),
                radial-gradient(1px 1px at 85% 35%, rgba(255,255,255,0.45) 0%, transparent 100%),
                radial-gradient(1px 1px at 20% 85%, rgba(255,255,255,0.3) 0%, transparent 100%),
                radial-gradient(1px 1px at 60% 45%, rgba(255,255,255,0.25) 0%, transparent 100%),
                radial-gradient(1px 1px at 92% 70%, rgba(255,255,255,0.4) 0%, transparent 100%),
                radial-gradient(1px 1px at 45% 95%, rgba(255,255,255,0.3) 0%, transparent 100%),
                radial-gradient(1px 1px at 75% 15%, rgba(255,255,255,0.35) 0%, transparent 100%);
            pointer-events: none;
            z-index: 0;
        }

        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 60px;
            background: linear-gradient(180deg, rgba(11,12,16,0.97) 0%, rgba(11,12,16,0.0) 100%);
            backdrop-filter: blur(4px);
        }

        .nav-logo {
            font-family: 'Cinzel Decorative', serif;
            font-size: 1.1rem;
            color: var(--gold);
            text-decoration: none;
            letter-spacing: 0.04em;
        }

        .nav-links {
            display: flex;
            gap: 36px;
            list-style: none;
        }

        .nav-links a {
            font-family: 'Cinzel', serif;
            font-size: 0.78rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-muted);
            text-decoration: none;
            transition: color var(--transition);
        }

        .nav-links a:hover { color: var(--gold-light); }

        main {
            position: relative;
            z-index: 1;
            padding-top: 80px;
        }

        .divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
            margin: 0 auto;
        }

        footer {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 40px 20px;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            color: var(--text-muted);
            border-top: 1px solid rgba(201,168,76,0.1);
        }

        footer span { color: var(--gold-dim); }

        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.7s ease, transform 0.7s ease;
        }
        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>

    {% block extra_head %}{% endblock %}
</head>
<body>

<nav>
    <a href="/" class="nav-logo">✦ Universe Quiz</a>
    <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/quiz/hogwarts">Hogwarts</a></li>
        <li><a href="/quiz/chicago">Divergent</a></li>
        <li><a href="/quiz/olympus">Olympus</a></li>
    </ul>
</nav>

<main>
    {% block content %}{% endblock %}
</main>

<footer>
    <p>✦ <span>Universe Quiz</span> · Discover Where You Truly Belong ✦</p>
    <p>Made by Afrin Khanam</p>
</footer>

<script>
    // Scroll reveal
    const reveals = document.querySelectorAll('.reveal');
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.12 });
    reveals.forEach(el => observer.observe(el));
</script>

{% block extra_scripts %}{% endblock %}

</body>
</html>
